name: Deploy Visualization

on:
  push:
    branches: [main]
    paths:
      - 'viz/**'
      - 'data/viz/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Copy pre-computed data into viz/data/ for the static site
      - name: Copy viz data
        run: |
          mkdir -p viz/data
          if [ -d data/viz ] && [ "$(ls -A data/viz)" ]; then
            cp data/viz/*.json viz/data/
          else
            echo "No viz data found — site will load in demo mode"
          fi

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: viz/

      - id: deployment
        uses: actions/deploy-pages@v4
