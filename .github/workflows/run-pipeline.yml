name: Run Data Pipeline

on:
  # Scheduled runs are disabled until step 02 has materialized-table skip logic.
  # Without it, every weekly run re-scans ~100GB from GH Archive (BigQuery cost).
  # Re-enable by uncommenting the `schedule` block once 02 checks for an existing
  # materialized table before running the full scan.
  # schedule:
  #   - cron: '0 4 * * 0'  # Sundays at 4am UTC
  workflow_dispatch:
    inputs:
      step:
        description: 'Which step to run (01, 02, 03, 04, 05, or all)'
        required: false
        default: 'all'
      sample_size:
        description: 'User sample size for step 01 and downstream enrichment'
        required: false
        default: '10000'
      gh_api_threads:
        description: 'Concurrent GitHub API threads for step 03'
        required: false
        default: '4'
      gh_max_new_profiles:
        description: 'Max uncached profiles to fetch in step 03 (0 = no cap)'
        required: false
        default: '5000'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}   # named GH_TOKEN to avoid conflict with built-in
      # Allow step 02 to run the first-time ~100GB BQ scan in CI.
      # Safe because step 02 skips the scan if the materialized table already exists.
      BQ_ALLOW_LARGE_QUERY: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Restore pipeline raw cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/raw/sampled_users.parquet
            data/raw/gh_profiles_cache.parquet
          key: pipeline-raw-v1-${{ runner.os }}-sample-${{ github.event.inputs.sample_size || '10000' }}-${{ github.run_id }}
          restore-keys: |
            pipeline-raw-v1-${{ runner.os }}-sample-${{ github.event.inputs.sample_size || '10000' }}-
            pipeline-raw-v1-${{ runner.os }}-

      - name: Write .env
        run: |
          cat > .env <<EOF
          GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          GITHUB_TOKEN=${{ secrets.GH_TOKEN }}
          BQ_DATASET=github_stats_work
          SAMPLE_SIZE=${{ github.event.inputs.sample_size || '10000' }}
          GH_API_THREADS=${{ github.event.inputs.gh_api_threads || '4' }}
          GH_MAX_NEW_PROFILES=${{ github.event.inputs.gh_max_new_profiles || '5000' }}
          EOF
          echo "Configured SAMPLE_SIZE=${{ github.event.inputs.sample_size || '10000' }} GH_API_THREADS=${{ github.event.inputs.gh_api_threads || '4' }} GH_MAX_NEW_PROFILES=${{ github.event.inputs.gh_max_new_profiles || '5000' }}"

      - name: Step 01 — Sample users (skip if parquet exists)
        if: ${{ github.event.inputs.step == '01' || github.event.inputs.step == '03' || github.event.inputs.step == 'all' || github.event_name == 'schedule' }}
        run: |
          if [ ! -f data/raw/sampled_users.parquet ]; then
            python pipeline/01_sample_users.py
          else
            echo "sampled_users.parquet already exists, skipping"
          fi

      - name: Step 03 — Enrich via GitHub API
        if: ${{ github.event.inputs.step == '03' || github.event.inputs.step == 'all' || github.event_name == 'schedule' }}
        run: python pipeline/03_enrich_github_api.py

      - name: Step 03 progress summary
        if: ${{ github.event.inputs.step == '03' || github.event.inputs.step == 'all' || github.event_name == 'schedule' }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import pandas as pd

          sampled_path = Path('data/raw/sampled_users.parquet')
          cache_path = Path('data/raw/gh_profiles_cache.parquet')
          confirmed_path = Path('data/raw/confirmed_users.csv')

          total_sampled = 0
          cached_entries = 0
          confirmed_rows = 0

          if sampled_path.exists():
              total_sampled = int(pd.read_parquet(sampled_path)['login'].nunique())

          if cache_path.exists():
              cached_entries = int(pd.read_parquet(cache_path)['key'].nunique())

          if confirmed_path.exists():
              confirmed_rows = int(len(pd.read_csv(confirmed_path)))

          remaining = max(total_sampled - cached_entries, 0)
          coverage = (100.0 * cached_entries / total_sampled) if total_sampled else 0.0

          print(f"Step 03 progress: cached={cached_entries:,} / sampled={total_sampled:,} ({coverage:.1f}%) | remaining={remaining:,} | confirmed={confirmed_rows:,}")

          summary = [
              '## Step 03 Progress',
              '',
              f'- Sampled logins: **{total_sampled:,}**',
              f'- Cached profiles (processed): **{cached_entries:,}**',
              f'- Remaining uncached: **{remaining:,}**',
              f'- Cache coverage: **{coverage:.1f}%**',
              f'- Confirmed pre-2019 users: **{confirmed_rows:,}**',
          ]
          summary_path = Path(__import__('os').environ['GITHUB_STEP_SUMMARY'])
          with open(summary_path, 'a', encoding='utf-8') as f:
              f.write('\n'.join(summary) + '\n')
          PY

      - name: Step 02 — Fetch yearly commits from BigQuery
        if: ${{ github.event.inputs.step == '02' || github.event.inputs.step == 'all' || github.event_name == 'schedule' }}
        run: |
          if [ ! -f data/raw/yearly_commits.parquet ]; then
            python pipeline/02_fetch_yearly_commits.py
          else
            echo "yearly_commits.parquet already exists, skipping full BQ scan"
          fi

      - name: Step 04 — Classify cohorts
        if: ${{ github.event.inputs.step == '04' || github.event.inputs.step == 'all' || github.event_name == 'schedule' }}
        run: python pipeline/04_classify_cohorts.py

      - name: Step 05 — Export viz data
        if: ${{ github.event.inputs.step == '05' || github.event.inputs.step == 'all' || github.event_name == 'schedule' }}
        run: python pipeline/05_export_viz_data.py


      - name: Save pipeline raw cache
        if: ${{ always() }}
        uses: actions/cache/save@v4
        with:
          path: |
            data/raw/sampled_users.parquet
            data/raw/gh_profiles_cache.parquet
          key: pipeline-raw-v1-${{ runner.os }}-sample-${{ github.event.inputs.sample_size || '10000' }}-${{ github.run_id }}

      - name: Commit updated viz data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/viz/
          git diff --staged --quiet || git commit -m "chore: refresh viz data [skip ci]"
          git push
